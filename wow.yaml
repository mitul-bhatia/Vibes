skill:
  name: diagram-generator
  version: 1.0.0
  description: >
    A reusable skill for generating clean, structured software diagrams using Mermaid syntax.
    Covers UML (Structural + Behavioral) and ERD diagrams, plus User Flow diagrams.
    This skill is project-agnostic — provide context about your project and the agent
    will generate the appropriate diagram following the rules and templates defined here.
  trigger_phrases:
    - "generate a class diagram"
    - "make a sequence diagram"
    - "draw a use case diagram"
    - "create an ERD"
    - "generate a user flow"
    - "make a UML diagram"
    - "diagram this"


# ─────────────────────────────────────────────
# GLOBAL RULES — applied to ALL diagrams
# ─────────────────────────────────────────────
global_rules:
  format: mermaid
  output_wrapper: "```mermaid ... ```"
  style_guidelines:
    - Use PascalCase for class and entity names (e.g., UserProfile, OrderItem)
    - Use camelCase for attributes and methods (e.g., userId, getOrder())
    - Keep node labels short — max 4 words
    - Never nest more than 3 levels deep in any diagram
    - Add a title using Mermaid's `---\\ntitle: ...\\n---` frontmatter block
    - Always include a brief plain-English summary ABOVE the Mermaid block explaining what the diagram shows
    - After the diagram, list any assumptions made in a bullet list
  quality_checks:
    - All relationships must be labelled
    - No orphan nodes (every node must connect to at least one other)
    - No duplicate node names
    - Cardinalities must be explicit in ERDs


# ─────────────────────────────────────────────
# 3. UNIFIED MODELLING LANGUAGE (UML)
# ─────────────────────────────────────────────

uml:

  # ── 3.1 STRUCTURAL UML ──────────────────────

  structural:

    class_diagram:
      description: >
        Shows the static structure of the system — classes, their attributes,
        methods, and the relationships between them.
      mermaid_type: classDiagram
      rules:
        - Define visibility using +, -, # (public, private, protected)
        - Always type attributes: name String, age Int
        - Always type method return values: getUser() User
        - Group related classes using `namespace` blocks when there are more than 6 classes
        - Do NOT show implementation details — only the interface contract
      template: |
        ```mermaid
        ---
        title: [System/Module] Class Diagram
        ---
        classDiagram
          namespace Module {
            class ClassName {
              +publicAttribute Type
              -privateAttribute Type
              #protectedAttribute Type
              +publicMethod() ReturnType
              -privateMethod() ReturnType
            }
          }

          ClassName --> AnotherClass : relationship label
        ```
      relationship_types:
        inheritance:    ClassName --|> ParentClass
        composition:    ClassName *-- Component
        aggregation:    ClassName o-- Component
        association:    ClassName --> AnotherClass
        dependency:     ClassName ..> AnotherClass
        realization:    ClassName ..|> Interface
      example: |
        ```mermaid
        ---
        title: E-Commerce Order Class Diagram
        ---
        classDiagram
          class User {
            +userId String
            +email String
            -passwordHash String
            +placeOrder() Order
            +getProfile() UserProfile
          }

          class Order {
            +orderId String
            +status String
            +createdAt Date
            +calculateTotal() Float
          }

          class OrderItem {
            +itemId String
            +quantity Int
            +unitPrice Float
          }

          class Product {
            +productId String
            +name String
            +stock Int
          }

          User --> Order : places
          Order *-- OrderItem : contains
          OrderItem --> Product : references
        ```

    class_relationship:
      description: >
        A focused sub-diagram showing ONLY the relationships between classes,
        without attributes or methods. Use when the structure is complex and
        you want to communicate dependencies clearly.
      mermaid_type: classDiagram
      rules:
        - Omit all attributes and methods — show class names only
        - Every arrow MUST have a label
        - Use cardinality annotations where relevant ("1", "1..*", "0..*", "0..1")
        - Color-code by domain using Mermaid `style` or `classDef` directives
      template: |
        ```mermaid
        ---
        title: [Module] Class Relationships
        ---
        classDiagram
          ClassA "1" --> "0..*" ClassB : label
          ClassB "many" --o "1" ClassC : label
        ```


  # ── 3.2 BEHAVIORAL UML ──────────────────────

  behavioral:

    sequence_diagram:
      description: >
        Shows how objects interact over time — the order of messages/calls
        between actors and systems for a specific scenario or use case.
      mermaid_type: sequenceDiagram
      rules:
        - Always start with an Actor (human) on the left
        - Use `activate` / `deactivate` to show lifeline activation
        - Use `alt` / `else` for conditional flows
        - Use `loop` for repeated operations
        - Use `Note over X,Y` to annotate important steps
        - Name participants clearly — use short display aliases with `participant X as Label`
        - Show both success and error paths using `alt`
      template: |
        ```mermaid
        ---
        title: [Feature/Flow] Sequence Diagram
        ---
        sequenceDiagram
          actor U as User
          participant FE as Frontend
          participant BE as Backend
          participant DB as Database

          U->>FE: action
          activate FE
          FE->>BE: API call
          activate BE

          alt Success
            BE->>DB: query
            DB-->>BE: result
            BE-->>FE: 200 OK response
            FE-->>U: show result
          else Error
            BE-->>FE: 4xx/5xx error
            FE-->>U: show error message
          end

          deactivate BE
          deactivate FE
        ```
      example: |
        ```mermaid
        ---
        title: User Login Sequence
        ---
        sequenceDiagram
          actor U as User
          participant FE as Frontend
          participant Auth as Auth Service
          participant DB as Database

          U->>FE: submit credentials
          activate FE
          FE->>Auth: POST /login {email, password}
          activate Auth
          Auth->>DB: find user by email
          DB-->>Auth: user record

          alt Valid credentials
            Auth->>Auth: verify password hash
            Auth-->>FE: 200 OK + JWT token
            FE-->>U: redirect to dashboard
          else Invalid credentials
            Auth-->>FE: 401 Unauthorized
            FE-->>U: show error message
          end

          deactivate Auth
          deactivate FE
        ```

    use_case_diagram:
      description: >
        Shows WHAT the system does and WHO interacts with it.
        Focuses on actors and their interactions with system features — not HOW they work internally.
      mermaid_type: graph (used to simulate use case diagrams)
      note: >
        Mermaid does not have a native use case diagram type.
        Use `graph LR` or `graph TB` with specific conventions below to simulate one cleanly.
      rules:
        - Actors are represented as rectangles with a 👤 prefix or `actor` label convention
        - Use Cases are represented as rounded rectangles (stadium shape using `([...])`)
        - System boundary is represented as a subgraph
        - Use `-->` with a label for associations
        - Use `..>` and `<<include>>` / `<<extend>>` labels for include/extend relationships
        - Actors appear OUTSIDE the system boundary subgraph
        - Group use cases by domain inside the subgraph
      template: |
        ```mermaid
        ---
        title: [System] Use Case Diagram
        ---
        graph LR
          ActorA["👤 Actor Name"]
          ActorB["👤 Actor Name"]

          subgraph System["System Boundary"]
            UC1(["Use Case One"])
            UC2(["Use Case Two"])
            UC3(["Use Case Three"])
          end

          ActorA --> UC1
          ActorA --> UC2
          ActorB --> UC3
          UC2 ..> UC3 : <<include>>
        ```
      example: |
        ```mermaid
        ---
        title: Online Banking Use Case Diagram
        ---
        graph LR
          Customer["👤 Customer"]
          Admin["👤 Admin"]

          subgraph Bank["Online Banking System"]
            Login(["Login"])
            ViewBalance(["View Balance"])
            Transfer(["Transfer Funds"])
            Authenticate(["Authenticate 2FA"])
            ManageUsers(["Manage Users"])
            GenerateReport(["Generate Reports"])
          end

          Customer --> Login
          Customer --> ViewBalance
          Customer --> Transfer
          Transfer ..> Authenticate : <<include>>
          Login ..> Authenticate : <<include>>
          Admin --> ManageUsers
          Admin --> GenerateReport
        ```


# ─────────────────────────────────────────────
# 4. ENTITY RELATIONSHIP DIAGRAM (ERD)
# ─────────────────────────────────────────────

erd:
  description: >
    Models the data structure of a system — entities (tables), their attributes,
    and how they relate to each other. Used for database design.
  mermaid_type: erDiagram
  rules:
    - Entity names in SCREAMING_SNAKE_CASE (e.g., USER_PROFILE, ORDER_ITEM)
    - All primary keys suffixed with _id (e.g., user_id, order_id)
    - All foreign keys must appear as attributes in the child entity
    - Mark primary keys with PK and foreign keys with FK in comments
    - Every relationship must have a label (verb phrase, e.g., "places", "contains")
    - Attributes must include data type: string, int, float, boolean, date, uuid

  components:
    entities:
      definition: A real-world object or concept with data worth storing (maps to a DB table)
      rule: Every entity MUST have a primary key attribute

    attributes:
      definition: Properties that describe an entity
      types:
        - Simple: single, indivisible value (name, age)
        - Composite: can be broken into sub-parts (address → street, city, zip)
        - Derived: computed from other attributes (age from birthDate)
        - Multi-valued: can hold multiple values (phone numbers)
      rule: Derived attributes should be noted with a comment, not stored as-is

    relationships:
      definition: How two entities are associated
      rule: Always bi-directional — label describes the association from left to right

  cardinality_mapping:
    notation: crow_foot  # Mermaid uses crow's foot notation
    types:
      one_to_one:
        symbol:  "||--||"
        meaning: Exactly one on both sides
        example: USER ||--|| USER_PROFILE : "has"
      one_to_many:
        symbol:  "||--o{"
        meaning: One on left, zero or more on right
        example: USER ||--o{ ORDER : "places"
      many_to_one:
        symbol:  "}o--||"
        meaning: Zero or more on left, one on right
        example: ORDER_ITEM }o--|| PRODUCT : "references"
      many_to_many:
        symbol:  "}o--o{"
        meaning: Zero or more on both sides (resolve with junction table)
        example: STUDENT }o--o{ COURSE : "enrolls in"
      zero_or_one_to_one:
        symbol:  "|o--||"
        meaning: Optional on left, mandatory one on right
        example: USER |o--|| ADDRESS : "has"

  template: |
    ```mermaid
    ---
    title: [System] Entity Relationship Diagram
    ---
    erDiagram
      ENTITY_A {
        uuid entity_a_id PK
        string attribute_one
        int attribute_two
        date created_at
      }

      ENTITY_B {
        uuid entity_b_id PK
        uuid entity_a_id FK
        string attribute_one
        boolean is_active
      }

      ENTITY_A ||--o{ ENTITY_B : "relationship verb"
    ```
  example: |
    ```mermaid
    ---
    title: E-Commerce Database ERD
    ---
    erDiagram
      USER {
        uuid user_id PK
        string email
        string name
        date created_at
      }

      ADDRESS {
        uuid address_id PK
        uuid user_id FK
        string street
        string city
        string zip_code
        string country
      }

      ORDER {
        uuid order_id PK
        uuid user_id FK
        string status
        float total_amount
        date placed_at
      }

      ORDER_ITEM {
        uuid item_id PK
        uuid order_id FK
        uuid product_id FK
        int quantity
        float unit_price
      }

      PRODUCT {
        uuid product_id PK
        string name
        float price
        int stock_quantity
      }

      USER ||--o{ ADDRESS : "has"
      USER ||--o{ ORDER : "places"
      ORDER ||--|{ ORDER_ITEM : "contains"
      ORDER_ITEM }o--|| PRODUCT : "references"
    ```


# ─────────────────────────────────────────────
# 5. USER FLOW DIAGRAM
# ─────────────────────────────────────────────

user_flow:
  description: >
    Shows the path(s) a user takes through a product to complete a goal.
    Focuses on screens, decisions, and outcomes — not internal system logic.
  mermaid_type: flowchart TD  # top-down, or LR for wide flows
  rules:
    - Always start with an Entry Point node (e.g., App Launch, Landing Page)
    - Always end with a terminal Goal node (Success) or Exit node
    - Decision nodes are diamond shaped using `{question?}` syntax
    - Screens/Pages use rounded rectangles: `([Screen Name])`
    - Actions/Events use rectangles: `[Action]`
    - Terminal nodes (success, exit) use stadium shape: `([Goal Achieved])`
    - Use color via `classDef` to distinguish: screens (blue), decisions (yellow), success (green), error (red)
    - Label every arrow with the user action or system trigger that causes the transition
    - Parallel paths must eventually converge or terminate — no dangling branches
    - Keep it user-perspective — no backend/API nodes in this diagram

  node_legend:
    entry:     "((Start))"
    screen:    "[Screen Name]"
    decision:  "{Decision?}"
    action:    "[User Action]"
    success:   "([✅ Goal Achieved])"
    exit:      "([🚪 Exit])"

  template: |
    ```mermaid
    ---
    title: [Feature] User Flow
    ---
    flowchart TD
      classDef screen fill:#dbeafe,stroke:#3b82f6,color:#1e3a5f
      classDef decision fill:#fef9c3,stroke:#eab308,color:#713f12
      classDef success fill:#dcfce7,stroke:#22c55e,color:#14532d
      classDef error fill:#fee2e2,stroke:#ef4444,color:#7f1d1d
      classDef entry fill:#f3e8ff,stroke:#a855f7,color:#3b0764

      START((Start)):::entry
      S1[Screen One]:::screen
      D1{Decision?}:::decision
      S2[Screen Two]:::screen
      S3[Error Screen]:::error
      END([✅ Goal Completed]):::success
      EXIT([🚪 Exit]):::exit

      START --> S1
      S1 -->|user action| D1
      D1 -->|Yes| S2
      D1 -->|No| S3
      S2 -->|complete| END
      S3 -->|retry| S1
      S3 -->|give up| EXIT
    ```
  example: |
    ```mermaid
    ---
    title: User Onboarding Flow
    ---
    flowchart TD
      classDef screen fill:#dbeafe,stroke:#3b82f6,color:#1e3a5f
      classDef decision fill:#fef9c3,stroke:#eab308,color:#713f12
      classDef success fill:#dcfce7,stroke:#22c55e,color:#14532d
      classDef error fill:#fee2e2,stroke:#ef4444,color:#7f1d1d
      classDef entry fill:#f3e8ff,stroke:#a855f7,color:#3b0764

      START((App Launch)):::entry
      LANDING[Landing Page]:::screen
      SIGNUP[Sign Up Form]:::screen
      LOGIN[Login Form]:::screen
      D1{Has Account?}:::decision
      D2{Email Valid?}:::decision
      VERIFY[Email Verification]:::screen
      PROFILE[Complete Profile]:::screen
      DASHBOARD[Dashboard]:::screen
      ERROR[Validation Error]:::error
      SUCCESS([✅ Onboarding Complete]):::success
      EXIT([🚪 Exit App]):::exit

      START --> LANDING
      LANDING -->|click Sign Up| D1
      D1 -->|No| SIGNUP
      D1 -->|Yes| LOGIN
      SIGNUP -->|submit form| D2
      D2 -->|Valid| VERIFY
      D2 -->|Invalid| ERROR
      ERROR -->|fix & resubmit| D2
      VERIFY -->|confirmed| PROFILE
      PROFILE -->|saved| DASHBOARD
      LOGIN -->|authenticated| DASHBOARD
      DASHBOARD --> SUCCESS
      LANDING -->|close app| EXIT
    ```


# ─────────────────────────────────────────────
# AGENT INSTRUCTIONS — how to use this skill
# ─────────────────────────────────────────────

agent_instructions:
  how_to_use: >
    When asked to generate a diagram, follow these steps strictly:

    1. IDENTIFY which diagram type is needed from: class_diagram, class_relationship,
       sequence_diagram, use_case_diagram, erd, user_flow

    2. READ the rules for that diagram type from this skill file

    3. EXTRACT entities, actors, relationships, and flows from the project context
       or documents provided by the user

    4. WRITE a plain-English summary of what the diagram will show (2-3 sentences)

    5. GENERATE the Mermaid diagram following the template and rules exactly

    6. LIST any assumptions made (entities inferred, relationships guessed, etc.)

    7. ASK the user if they want to refine anything

  do_not:
    - Do not invent entities or actors not mentioned in the project context
    - Do not skip relationship labels
    - Do not mix diagram types in one Mermaid block
    - Do not use raw markdown tables as substitutes for diagrams
    - Do not output a diagram without a title

  output_format: |
    ### [Diagram Type] — [Subject]

    **What this shows:** [2-3 sentence plain-English description]

    ```mermaid
    [diagram code here]
    ```

    **Assumptions:**
    - [assumption 1]
    - [assumption 2]